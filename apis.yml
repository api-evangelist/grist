aid: grist
name: Grist
description: >
  Grist is a collaborative spreadsheet and relational database platform that
  combines the flexibility of spreadsheets with the power of a structured
  database. It provides a REST API for reading and writing table records,
  managing organizations, workspaces, and documents, executing SQL queries
  against document data, and configuring outgoing webhooks triggered by data
  changes. Grist is available as a cloud-hosted SaaS at getgrist.com and as
  an open-source self-hosted deployment via the Apache-licensed grist-core
  repository maintained by Grist Labs.
