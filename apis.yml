apis:
  - aid: grist:grist-rest-api
    name: Grist REST API
    description: >
      The Grist REST API provides programmatic access to organizations,
      workspaces, documents, and table records. Supports CRUD operations on
      rows, SQL SELECT queries against documents, attachment management, user
      and permission management, and webhook configuration for event-driven
      integrations.
